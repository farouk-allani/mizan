# MIZAN configuration — competition profile.
# Post-hackathon: copy to config/personal.yaml, lower risk caps, point MIZAN_CONFIG at it.

mode: paper            # paper | live  — flip to live ONLY after preflight.sh passes
chain: bsc

compliance:
  halalMode: true      # spot-only invariant. Setting venues.perps.enabled=true while
                       # this is true makes the config REFUSE TO LOAD.

venues:
  spot:
    enabled: true      # TwakSpotVenue — sole execution layer (self-custody, local signing)
  perps:
    enabled: false     # reserved port; no adapter ships. See ARCHITECTURE.md §Venues.

loop:
  intervalMinutes: 60             # paper: 15 is fine for diagnostics. LIVE: keep 60+ to avoid churn and x402 burn.
                                  # x402 costs 0.01 USDC/call, ~2 paid REST calls/cycle; 60-min ≈ $3.40/week,
                                  # leaving room inside a 20 USDC Base budget.
  killSwitchPath: ./KILL

risk:
  maxTradePctOfEquity: 0.25       # per-trade clamp; sized for concentrated entries
  maxTradesPerDay: 6              # enough for entry + scale-in + a protective exit/re-entry
  maxDailyNotionalPctOfEquity: 0.8
  maxDrawdownPct: 0.18            # SOFT breaker: flatten to stable, then re-arm (re-armable)
  hardStopDrawdownPct: 0.25       # HARD stop vs all-time peak: flatten permanently, no re-risk
  breakerRearmHours: 8            # hours flat after a soft trip before redeploying
  maxSlippagePct: 1.0
  cooldownMinutes: 45             # discretionary spacing; protective risk_exit is exempt
  minHoldMinutes: 90              # blocks fast discretionary round trips; risk_exit exempt
  reentryCooldownMinutes: 180     # anti-whipsaw: stand down from new entries after a stop-out
  trailingStopPct: 0.08           # DEFENSE: exit a winner that gives back >8% from its peak
  switchMarginScore: 4            # OFFENSE: only rotate when a leader is *materially* stronger
  maxVolatilePctOfEquity: 0.6     # concentrated-but-clamped volatile ceiling
  contrarianEnabled: true         # in extreme fear, take a small capped mean-reversion bet
  contrarianFearThreshold: 25     # only when Fear & Greed <= 25 (deep capitulation)
  contrarianMaxTradePctOfEquity: 0.10   # smaller per-trade cap for contrarian probes
  contrarianMaxVolatilePctOfEquity: 0.25  # smaller volatile ceiling while running contrarian
  minPortfolioUsd: 25             # never approach the $1 dust rule
  stableSymbol: USDT

heartbeat:
  enabled: true
  deadlineUtcHour: 20             # if no trade by 20:00 UTC, fire the qualification trade
  usdNotional: 5
  toSymbol: CAKE

data:
  cmcTransport: apikey            # apikey (build window) | x402 (live week — pays per call)
  cmcMcpUrl: https://mcp.coinmarketcap.com/mcp
  # Diagnostic only: TWAK live mode uses cmcX402RestBase, not this MCP x402 URL.
  cmcX402Url: https://mcp.coinmarketcap.com/x402/mcp
  cmcX402RestBase: https://pro-api.coinmarketcap.com/x402
  x402MaxPaymentAtomic: "10000"   # 0.01 USDC @ 6dp per call

llm:
  enabled: true
  baseUrl: https://token-plan-sgp.xiaomimimo.com/v1   # any OpenAI-compatible endpoint (MiMo works too)
  model: mimo-v2.5-pro
  apiKeyEnv: LLM_API_KEY
  temperature: 0.2

notify:
  telegram:
    enabled: true
    botTokenEnv: TELEGRAM_BOT_TOKEN
    chatIdEnv: TELEGRAM_CHAT_ID

twak:
  bin: twak
  walletPasswordEnv: TWAK_WALLET_PASSWORD
  timeoutMs: 180000

paths:
  ledger: ./data/ledger.jsonl
  state: ./data/state.json
